# 在 push tag v* 时构建 macOS（CLI + .app）+ Linux（CLI）+ Windows（CLI）并创建 GitHub Release
# 用法：改 Cargo.toml version → commit & push → git tag vX.Y.Z → git push origin vX.Y.Z
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Read version
        id: version
        run: echo "version=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/' | tr -d ' ')" >> $GITHUB_OUTPUT

      - name: Package CLI tar.gz
        run: |
          mkdir -p dist
          cp target/release/open-flow dist/
          (cd dist && tar -czf "open-flow-aarch64-apple-darwin.tar.gz" open-flow)

      - name: Build .app and zip
        run: |
          chmod +x scripts/build-app.sh
          ./scripts/build-app.sh
          (cd dist && zip -rq "Open-Flow-${{ steps.version.outputs.version }}-macos-aarch64.app.zip" "Open Flow.app")

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            dist/open-flow-aarch64-apple-darwin.tar.gz
            dist/Open-Flow-*.app.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Package zip
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive -Path target/release/open-flow.exe -DestinationPath "dist/open-flow-x86_64-pc-windows-msvc.zip"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifact
          path: dist/open-flow-x86_64-pc-windows-msvc.zip

  build-linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux deps (ALSA + X11/Xi/Xtst for cpal/rdev)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libx11-dev libxi-dev libxtst-dev

      - name: Build release
        run: cargo build --release

      - name: Package CLI tar.gz
        run: |
          mkdir -p dist
          cp target/release/open-flow dist/
          (cd dist && tar -czf "open-flow-x86_64-unknown-linux-gnu.tar.gz" open-flow)

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifact
          path: dist/open-flow-x86_64-unknown-linux-gnu.tar.gz

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-artifact

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-artifact

      - name: Get tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # download-artifact 会把多个 artifact 合并到当前目录，文件在根下
          MACOS_TAR="open-flow-aarch64-apple-darwin.tar.gz"
          MACOS_ZIP="$(ls Open-Flow-*-macos-aarch64.app.zip 2>/dev/null | head -1)"
          LINUX_TAR="open-flow-x86_64-unknown-linux-gnu.tar.gz"
          WIN_ZIP="open-flow-x86_64-pc-windows-msvc.zip"
          for f in "$MACOS_TAR" "$MACOS_ZIP" "$LINUX_TAR" "$WIN_ZIP"; do
            [ -n "$f" ] && [ -f "$f" ] || { echo "Missing: $f"; exit 1; }
          done
          gh release create "${{ steps.tag.outputs.tag }}" \
            "$MACOS_TAR" "$MACOS_ZIP" "$LINUX_TAR" "$WIN_ZIP" \
            --title "${{ steps.tag.outputs.tag }}" \
            --notes "## ${{ steps.tag.outputs.tag }}

          - **macOS (Apple Silicon)**：\`open-flow-aarch64-apple-darwin.tar.gz\`（CLI）或 \`Open-Flow-*-macos-aarch64.app.zip\`（.app 双击运行）
          - **Linux (x86_64)**：\`open-flow-x86_64-unknown-linux-gnu.tar.gz\`（CLI），解压后 \`open-flow start --foreground\`，热键右 Meta，粘贴需 xdotool/wtype
          - **Windows (x86_64)**：\`open-flow-x86_64-pc-windows-msvc.zip\`（CLI），解压得到 \`open-flow.exe\`，\`open-flow.exe start --foreground\`，热键右侧 Win 键，转写结果剪贴板（Ctrl+V 粘贴）
          "
